[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers for categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require database or multiple components)
    e2e: End-to-end tests (full system with real database)
    slow: Tests that take more than 1 second
    db: Tests requiring PostgreSQL database
    sqlite: Tests for SQLite database support
    hitl: Tests for Human-in-the-Loop functionality
    real_graph: Tests using real LangGraph graphs with fake LLM

# Output options
console_output_style = progress
addopts = 
    --strict-markers
    --tb=short
    -ra
    --color=yes

# Asyncio configuration
asyncio_mode = auto

# 외부 라이브러리의 DeprecationWarning 필터링
# a2a SDK가 starlette의 deprecated 상수를 사용 (RFC 9110에서 이름 변경됨)
filterwarnings =
    ignore:'HTTP_413_REQUEST_ENTITY_TOO_LARGE' is deprecated:DeprecationWarning

# Coverage options (if using pytest-cov)
# addopts = --cov=src/agent_server --cov-report=html --cov-report=term-missing
