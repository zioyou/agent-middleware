services:
  # PostgreSQL database for LangGraph and metadata
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: open_langgraph
    ports:
      - "6000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d open_langgraph" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Agent Middleware Server
  agent-middleware:
    container_name: agent-middleware
    image: agent-middleware:latest
    build:
      context: .
      dockerfile: ./Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/open_langgraph
      - REDIS_URL=redis://redis:6379/0
      - AUTH_TYPE=noop
      - DEBUG=true
      - PORT=${PORT:-8000}
      - RATE_LIMIT_ENABLED=false
      - BROWSER_DOCKER_NETWORK=agent-middleware_default
      - BROWSER_IMAGE=agent-browser:latest
      - TRAEFIK_VNC_PORT=6080

    group_add:
      - "1001"  # 호스트 docker group GID — docker.sock 접근 권한
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents.json:/app/agents.json:ro
      - ./agents:/app/agents:ro # 활성화: 코드 변경사항 즉시 반영
      - ./src:/app/src:ro # for hot reload support of server
      - ./auth.py:/app/auth.py:ro
      - ./.env:/app/.env:ro
      - ./alembic:/app/alembic:ro # for migrations
      - /var/run/docker.sock:/var/run/docker.sock  # Browser Manager: 동적 컨테이너 제어
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting Open LangGraph server...' &&
        uvicorn src.agent_server.main:app --host 0.0.0.0 --port $${PORT:-8000} --reload
      "

  # Redis for caching (optional - app works without it)
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Traefik — 브라우저 세션별 noVNC 역방향 프록시
  # session-{safe_id}.localhost:6080 → 해당 agent-browser 컨테이너:6080
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=agent-middleware_default"
      - "--entrypoints.vnc.address=:6080"
    ports:
      - "6080:6080"   # noVNC 진입점 (세션별 서브도메인으로 라우팅)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # AI 브라우저 자동화 이미지 빌드 전용
  # 실행은 browser_manager.py가 thread_id 기준으로 동적 생성/삭제
  # 이미지 빌드: docker compose build agent-browser
  agent-browser:
    build:
      context: ../agent-browser
      dockerfile: Dockerfile
    image: agent-browser:latest
    profiles:
      - browser-static  # 기본 docker compose up 에서 제외

  # Jaeger for OpenTelemetry tracing (optional - for observability testing)
  jaeger:
    image: jaegertracing/all-in-one:1.53
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    profiles:
      - observability # Only starts with: docker compose --profile observability up

volumes:
  postgres_data:
  redis_data:
